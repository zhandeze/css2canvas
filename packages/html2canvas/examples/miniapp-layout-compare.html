<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Miniapp layout compare</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #ffffff;
      }
      #fixture {
        width: 420px;
        padding: 24px;
        border: 6px solid #243447;
        background: #f4f7fb;
        color: #1b2a41;
        font-family: Arial, sans-serif;
        font-size: 18px;
        line-height: 1.45;
      }
      .title {
        font-size: 24px;
        font-weight: 700;
        text-decoration: underline;
        margin-bottom: 14px;
      }
      .body {
        width: 260px;
        letter-spacing: 0.2px;
      }
    </style>
  </head>
  <body>
    <div id="fixture">
      <div class="title">Miniapp compare</div>
      <div class="body">This fixture exercises wrapped text and nested block layout.</div>
    </div>
    <script src="../dist/html2canvas.js"></script>
  </body>
</html>
