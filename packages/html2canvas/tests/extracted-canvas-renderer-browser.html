<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Extracted Canvas Renderer Compare</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #f2f2f2;
        }

        #target {
            width: 360px;
            margin: 24px;
            padding: 20px;
            color: #1f2937;
            background: linear-gradient(135deg, #ffffff, #dbeafe);
            border: 4px solid #111827;
            border-radius: 18px;
            box-shadow: 12px 12px 0 rgba(17, 24, 39, 0.18);
        }

        #target h1 {
            margin: 0 0 12px;
            font-size: 26px;
            line-height: 1.1;
        }

        #target p {
            margin: 0 0 12px;
            line-height: 1.5;
        }

        #target .badge {
            display: inline-block;
            padding: 6px 10px;
            color: white;
            background: #0f766e;
            border-radius: 999px;
        }

        #target .row {
            margin-top: 16px;
            overflow: hidden;
        }

        #target .card {
            float: left;
            width: 140px;
            height: 80px;
            margin-right: 12px;
            padding: 10px;
            color: white;
            background: #dc2626;
            border-radius: 12px;
        }
    </style>
</head>
<body>
<div id="target">
    <h1>Canvas Renderer</h1>
    <p>Compare the original browser renderer with the extracted renderer core.</p>
    <span class="badge">baseline</span>
    <div class="row">
        <div class="card">left</div>
        <div class="card" style="background:#2563eb;">right</div>
    </div>
</div>
<div id="target-2" style="margin:24px; width:420px; background:#fff; border:8px solid #000; padding:18px;">
    <div style="float:left; width:90px; height:140px; background:#cc0000; border:6px solid #000; color:#fff; padding:10px;">
        toggle
    </div>
    <div style="float:right; width:240px; min-height:140px; border:10px solid #000; padding:12px;">
        <div style="float:left; width:70px; height:60px; margin-right:10px; background:#ffcc00; border:4px solid #000; padding:8px;">one</div>
        <div style="float:left; width:100px; height:60px; background:#111827; color:#fff; border:4px solid #000; padding:8px;">two</div>
        <div style="clear:both; margin-top:12px; font-size:18px; text-decoration: underline;">mixed layout</div>
    </div>
    <div style="clear:both;"></div>
</div>
<script src="/build/extracted-canvas-renderer-browser.js"></script>
</body>
</html>
