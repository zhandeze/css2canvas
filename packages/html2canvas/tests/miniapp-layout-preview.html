<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Miniapp Layout Preview</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #e8edf3;
            color: #0f172a;
            font-family: Arial, sans-serif;
        }

        body {
            padding: 24px;
        }

        h1 {
            margin: 0 0 16px;
            font-size: 24px;
        }

        .fixture-preview {
            margin: 0 0 24px;
            padding: 18px;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
        }

        .fixture-preview h2 {
            margin: 0 0 12px;
            font-size: 18px;
        }

        .canvas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }

        .canvas-card {
            padding: 12px;
            border: 1px solid #dbe3ec;
            border-radius: 10px;
            background: #f8fafc;
        }

        .canvas-label {
            font-weight: 700;
            margin-bottom: 6px;
        }

        .canvas-note {
            margin-bottom: 8px;
            color: #475569;
            font-size: 12px;
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            background: #fff;
            border: 1px solid #cbd5e1;
        }
    </style>
</head>
<body>
<h1>Miniapp Layout Preview</h1>
<script src="/build/miniapp-layout-preview.js"></script>
</body>
</html>
